<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WP Prospector // AUTH</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #00ff88;
      --green-dim: #00cc66;
      --bg: #020c08;
      --border: rgba(0,255,136,0.15);
      --border2: rgba(0,255,136,0.3);
      --text-dim: #3a7a58;
      --mono: 'Share Tech Mono', monospace;
      --ui: 'Rajdhani', sans-serif;
    }
    body {
      background: var(--bg);
      background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.012) 2px, rgba(0,255,136,0.012) 4px),
        linear-gradient(rgba(0,255,136,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.02) 1px, transparent 1px);
      background-size: auto, 32px 32px, 32px 32px;
      color: var(--green);
      font-family: var(--mono);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .card {
      width: 360px;
      border: 1px solid var(--border2);
      background: rgba(0,0,0,0.6);
      padding: 48px 36px;
      position: relative;
    }
    .card::before, .card::after,
    .card .corner-br, .card .corner-bl {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border-color: var(--green);
      border-style: solid;
    }
    .card::before  { top:-1px; left:-1px;  border-width: 2px 0 0 2px; }
    .card::after   { top:-1px; right:-1px; border-width: 2px 2px 0 0; }
    .card .corner-br { bottom:-1px; right:-1px; border-width: 0 2px 2px 0; }
    .card .corner-bl { bottom:-1px; left:-1px;  border-width: 0 0 2px 2px; }

    .logo-dot {
      width: 8px; height: 8px; background: var(--green);
      border-radius: 50%; box-shadow: 0 0 8px var(--green), 0 0 20px rgba(0,255,136,0.4);
      display: inline-block; margin-right: 8px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 8px var(--green), 0 0 20px rgba(0,255,136,0.4); }
      50% { box-shadow: 0 0 12px var(--green), 0 0 30px rgba(0,255,136,0.6); }
    }
    .title {
      font-family: var(--ui); font-size: 22px; font-weight: 700;
      letter-spacing: 4px; color: var(--green);
      text-shadow: 0 0 10px var(--green), 0 0 20px rgba(0,255,136,0.4);
      text-align: center; margin-bottom: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .subtitle {
      font-size: 10px; color: var(--text-dim); letter-spacing: 3px;
      text-align: center; margin-bottom: 36px;
    }
    input {
      width: 100%; background: rgba(0,255,136,0.04);
      border: 1px solid var(--border2);
      color: var(--green); padding: 12px 16px; border-radius: 2px;
      font-size: 18px; font-family: var(--mono);
      outline: none; text-align: center; letter-spacing: 6px;
      margin-bottom: 14px; transition: all 0.2s;
    }
    input:focus { border-color: var(--green); box-shadow: 0 0 12px rgba(0,255,136,0.15); }
    button {
      width: 100%; background: transparent;
      border: 1px solid var(--border2);
      color: var(--green); padding: 12px;
      font-size: 12px; font-family: var(--ui); font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      cursor: pointer; border-radius: 2px;
      transition: all 0.15s;
    }
    button:hover {
      background: rgba(0,255,136,0.08);
      border-color: var(--green);
      box-shadow: 0 0 12px rgba(0,255,136,0.2);
    }
    .error { color: #ff3355; font-size: 10px; text-align: center; margin-top: 12px;
      letter-spacing: 2px; display: none; }
    .hint { font-size: 9px; color: var(--text-dim); text-align: center;
      margin-top: 24px; letter-spacing: 2px; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
    .cursor::after { content:'█'; animation:blink 1s infinite; font-size:0.7em; margin-left:2px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="corner-br"></div>
    <div class="corner-bl"></div>
    <div class="title"><span class="logo-dot"></span>WP_PROSPECTOR</div>
    <div class="subtitle">CLIENT SCOUT AI // ACCESS CONTROL</div>
    <input type="password" id="pw" placeholder="········" autofocus
      onkeydown="if(event.key==='Enter')check()" />
    <button onclick="check()">► AUTHENTICATE</button>
    <div class="error" id="err">⚠ ACCESS DENIED // INVALID CREDENTIALS</div>
    <div class="hint">AUTHORIZED PERSONNEL ONLY</div>
  </div>
  <script>
    const PASSWORD = "Clicker133984!";
    function check() {
      if (document.getElementById("pw").value === PASSWORD) {
        sessionStorage.setItem("wp_auth", "1");
        window.location.href = "/app.html";
      } else {
        document.getElementById("err").style.display = "block";
        document.getElementById("pw").value = "";
        document.getElementById("pw").focus();
      }
    }
    if (sessionStorage.getItem("wp_auth") === "1") window.location.href = "/app.html";
  </script>
</body>
</html>
