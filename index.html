<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WP Prospector — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0e1117;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(82,113,255,0.08) 0%, transparent 70%);
    }
    .card {
      width: 380px;
      background: #161b27;
      border: 1px solid #2a3142;
      border-radius: 12px;
      padding: 40px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 36px; height: 36px; background: #5271ff;
      border-radius: 9px; display: flex; align-items: center;
      justify-content: center; font-size: 18px;
      box-shadow: 0 0 20px rgba(82,113,255,0.3);
    }
    .logo-text { font-weight: 700; font-size: 16px; }
    .logo-sub  { font-size: 11px; color: #8892a4; margin-top: 1px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #8892a4; margin-bottom: 28px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #8892a4; margin-bottom: 6px; letter-spacing: 0.3px; }
    input {
      width: 100%; background: #0a0d14;
      border: 1px solid #2a3142; color: #e2e8f0;
      padding: 11px 14px; border-radius: 8px;
      font-size: 14px; font-family: 'Inter', sans-serif;
      outline: none; margin-bottom: 20px;
      transition: border-color 0.15s, box-shadow 0.15s;
      letter-spacing: 3px;
    }
    input:focus {
      border-color: #5271ff;
      box-shadow: 0 0 0 3px rgba(82,113,255,0.15);
    }
    button {
      width: 100%; background: #5271ff; color: #fff;
      border: none; border-radius: 8px;
      padding: 12px; font-size: 14px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
    }
    button:hover { background: #6b87ff; }
    button:active { transform: scale(0.98); }
    .error {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      color: #ef4444; border-radius: 6px;
      padding: 9px 12px; font-size: 12px; font-weight: 500;
      margin-top: 14px; display: none; text-align: center;
    }
    .divider { border: none; border-top: 1px solid #2a3142; margin: 28px 0; }
    .footer { font-size: 11px; color: #4a5568; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div>
        <div class="logo-text">WP Prospector</div>
        <div class="logo-sub">Client Scout AI</div>
      </div>
    </div>
    <h1>Welcome back</h1>
    <p class="subtitle">Enter your password to access the dashboard.</p>
    <label for="pw">Password</label>
    <input type="password" id="pw" placeholder="••••••••" autofocus
      onkeydown="if(event.key==='Enter')check()" />
    <button onclick="check()">Sign in →</button>
    <div class="error" id="err">Incorrect password. Please try again.</div>
    <hr class="divider" />
    <div class="footer">Authorized access only · WP Prospector v2.0</div>
  </div>
  <script>
    const PASSWORD = "Clicker133984!";
    function check() {
      if (document.getElementById("pw").value === PASSWORD) {
        sessionStorage.setItem("wp_auth", "1");
        window.location.href = "/app.html";
      } else {
        document.getElementById("err").style.display = "block";
        document.getElementById("pw").value = "";
        document.getElementById("pw").focus();
      }
    }
    if (sessionStorage.getItem("wp_auth") === "1") window.location.href = "/app.html";
  </script>
</body>
</html>
