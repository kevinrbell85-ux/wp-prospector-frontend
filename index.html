<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WP Prospector — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0f; color: #e8e4dc;
      font-family: Georgia, serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #131108; border: 1px solid #2e2510;
      border-radius: 16px; padding: 48px 40px;
      width: 100%; max-width: 380px; text-align: center;
    }
    .logo { font-size: 10px; letter-spacing: 4px; color: #8a6a20; text-transform: uppercase; margin-bottom: 6px; }
    h1 { font-size: 26px; color: #f0e6c8; margin-bottom: 32px; }
    h1 span { color: #c8922a; }
    input {
      width: 100%; background: #0a0a08; border: 1px solid #2e2510;
      color: #e8e4dc; padding: 12px 16px; border-radius: 8px;
      font-size: 15px; font-family: Georgia, serif;
      outline: none; text-align: center; letter-spacing: 3px;
      margin-bottom: 14px;
    }
    input:focus { border-color: #c8922a; }
    button {
      width: 100%; background: linear-gradient(135deg, #c8922a, #a06818);
      color: #fff; border: none; border-radius: 8px;
      padding: 13px; font-size: 14px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      font-family: Georgia, serif; cursor: pointer;
    }
    .error { color: #ff6b6b; font-size: 13px; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">WordPress Prospector</div>
    <h1>Client Scout <span>AI</span></h1>
    <input type="password" id="pw" placeholder="Password" autofocus onkeydown="if(event.key==='Enter')check()" />
    <button onclick="check()">Enter →</button>
    <div class="error" id="err">Incorrect password.</div>
  </div>
  <script>
    // Set your password here — or use a Netlify environment variable approach
    const PASSWORD = "Clicker133984!";

    function check() {
      const val = document.getElementById("pw").value;
      if (val === PASSWORD) {
        sessionStorage.setItem("wp_auth", "1");
        window.location.href = "/app.html";
      } else {
        document.getElementById("err").style.display = "block";
        document.getElementById("pw").value = "";
        document.getElementById("pw").focus();
      }
    }

    // Already authenticated this session?
    if (sessionStorage.getItem("wp_auth") === "1") {
      window.location.href = "/app.html";
    }
  </script>
</body>
</html>
