<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WP Prospector</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e1117;
      --bg-card:   #161b27;
      --bg-hover:  #1c2333;
      --bg-input:  #0a0d14;
      --border:    #2a3142;
      --border-focus: #5271ff;
      --accent:    #5271ff;
      --accent-hover: #6b87ff;
      --accent-bg: rgba(82,113,255,0.1);
      --green:     #23c55e;
      --green-bg:  rgba(35,197,94,0.1);
      --red:       #ef4444;
      --red-bg:    rgba(239,68,68,0.1);
      --yellow:    #f59e0b;
      --yellow-bg: rgba(245,158,11,0.1);
      --cyan:      #06b6d4;
      --text:      #e2e8f0;
      --text-muted:#8892a4;
      --text-faint:#4a5568;
      --radius:    8px;
      --radius-sm: 6px;
      --shadow:    0 1px 3px rgba(0,0,0,0.4);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.5);
    }

    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.5; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a4560; }

    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 4px;
      background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px;
      background: var(--accent); border-radius: 50%; cursor: pointer;
      box-shadow: 0 0 0 3px rgba(82,113,255,0.2);
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeSlideIn 0.25s ease forwards; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; display: inline-block; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    if (sessionStorage.getItem('wp_auth') !== '1') window.location.href = '/';
    window.WP_API_URL = 'https://wp-prospector-backend-production.up.railway.app';
  </script>
  <script type="text/babel">
    const API_BASE = window.WP_API_URL || 'http://localhost:3001';
    const { useState, useRef, useEffect } = React;

    const PRIORITY_COLOR = { High: "var(--red)",    Medium: "var(--yellow)", Low: "var(--green)" };
    const PRIORITY_BG    = { High: "var(--red-bg)", Medium: "var(--yellow-bg)", Low: "var(--green-bg)" };
    const STATUS_COLOR   = { new: "var(--cyan)", contacted: "var(--yellow)", won: "var(--green)", lost: "var(--red)" };
    const STATUS_BG      = { new: "rgba(6,182,212,0.1)", contacted: "var(--yellow-bg)", won: "var(--green-bg)", lost: "var(--red-bg)" };

    const RADIUS_OPTIONS = [1, 3, 5, 10];
    const EST = {
      count: { 1:"~50",  3:"~200",  5:"~400",  10:"~800" },
      time:  { 1:"~5m",  3:"~15m",  5:"~25m",  10:"~45m" }
    };

    // ── Shared components ─────────────────────────────────────

    function Chip({ label, color, bg }) {
      return (
        <span style={{
          display: "inline-flex", alignItems: "center", gap: 4,
          background: bg, color, border: `1px solid ${color}33`,
          borderRadius: 20, padding: "2px 9px", fontSize: 11, fontWeight: 600,
          letterSpacing: 0.3, whiteSpace: "nowrap"
        }}>{label}</span>
      );
    }

    function SectionLabel({ children }) {
      return (
        <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-muted)",
          letterSpacing: 0.8, textTransform: "uppercase", marginBottom: 8 }}>
          {children}
        </div>
      );
    }

    function Card({ children, style }) {
      return (
        <div style={{ background: "var(--bg-card)", border: "1px solid var(--border)",
          borderRadius: 8, ...style }}>
          {children}
        </div>
      );
    }

    function StatBox({ value, label, color }) {
      return (
        <div style={{ textAlign: "center", padding: "12px 16px",
          background: "var(--bg-card)", border: "1px solid var(--border)",
          borderRadius: 8 }}>
          <div style={{ fontSize: 24, fontWeight: 700, color: color || "var(--text)", lineHeight: 1 }}>{value}</div>
          <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 4, fontWeight: 500 }}>{label}</div>
        </div>
      );
    }

    function PrimaryBtn({ children, onClick, disabled, loading, style }) {
      return (
        <button onClick={onClick} disabled={disabled || loading} style={{
          background: disabled ? "var(--bg-hover)" : "var(--accent)",
          color: disabled ? "var(--text-faint)" : "#fff",
          border: "none", borderRadius: 6,
          padding: "10px 20px", fontSize: 14, fontWeight: 600,
          cursor: disabled ? "not-allowed" : "pointer",
          display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
          transition: "background 0.15s, transform 0.1s",
          width: "100%", ...style
        }}
          onMouseEnter={e => { if (!disabled) e.currentTarget.style.background = "var(--accent-hover)"; }}
          onMouseLeave={e => { if (!disabled) e.currentTarget.style.background = disabled ? "var(--bg-hover)" : "var(--accent)"; }}
          onMouseDown={e => { if (!disabled) e.currentTarget.style.transform = "scale(0.98)"; }}
          onMouseUp={e => { e.currentTarget.style.transform = "scale(1)"; }}
        >
          {loading && <span className="spin" style={{ fontSize: 12 }}>⟳</span>}
          {children}
        </button>
      );
    }

    function GhostBtn({ children, onClick, style }) {
      return (
        <button onClick={onClick} style={{
          background: "transparent", color: "var(--text-muted)",
          border: "1px solid var(--border)", borderRadius: 6,
          padding: "9px 14px", fontSize: 13, fontWeight: 500,
          cursor: "pointer", transition: "all 0.15s", ...style
        }}
          onMouseEnter={e => { e.currentTarget.style.background = "var(--bg-hover)"; e.currentTarget.style.color = "var(--text)"; e.currentTarget.style.borderColor = "#3a4560"; }}
          onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "var(--text-muted)"; e.currentTarget.style.borderColor = "var(--border)"; }}
        >
          {children}
        </button>
      );
    }

    function FilterPill({ label, active, color, onClick }) {
      return (
        <button onClick={onClick} style={{
          background: active ? (color ? `${color}18` : "var(--accent-bg)") : "transparent",
          color: active ? (color || "var(--accent)") : "var(--text-muted)",
          border: `1px solid ${active ? (color ? `${color}55` : "var(--accent)") : "var(--border)"}`,
          borderRadius: 20, padding: "4px 14px", fontSize: 12, fontWeight: 600,
          cursor: "pointer", transition: "all 0.15s", whiteSpace: "nowrap"
        }}>{label}</button>
      );
    }

    function DarkInput({ value, onChange, placeholder, style, ...props }) {
      const [focused, setFocused] = useState(false);
      return (
        <input value={value} onChange={onChange} placeholder={placeholder}
          onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
          style={{
            width: "100%", background: "var(--bg-input)",
            border: `1px solid ${focused ? "var(--border-focus)" : "var(--border)"}`,
            boxShadow: focused ? "0 0 0 3px rgba(82,113,255,0.15)" : "none",
            color: "var(--text)", padding: "9px 12px", borderRadius: 6,
            fontSize: 14, fontFamily: "Inter,sans-serif", outline: "none",
            transition: "border-color 0.15s, box-shadow 0.15s", ...style
          }} {...props} />
      );
    }

    // ── App ───────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState("scan");

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100vh" }}>
          {/* Header */}
          <header style={{
            height: 56, display: "flex", alignItems: "center",
            padding: "0 24px", borderBottom: "1px solid var(--border)",
            background: "var(--bg-card)", flexShrink: 0,
            gap: 32, position: "relative", zIndex: 10
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ width: 28, height: 28, background: "var(--accent)",
                borderRadius: 7, display: "flex", alignItems: "center",
                justifyContent: "center", fontSize: 14 }}>⚡</div>
              <div>
                <div style={{ fontWeight: 700, fontSize: 15, color: "var(--text)", lineHeight: 1.1 }}>WP Prospector</div>
                <div style={{ fontSize: 11, color: "var(--text-muted)" }}>Client Scout AI</div>
              </div>
            </div>

            <nav style={{ display: "flex", gap: 2 }}>
              {[["scan","🔍  Scan"], ["prospects","📋  Prospects"], ["history","📅  History"]].map(([t, label]) => (
                <button key={t} onClick={() => setTab(t)} style={{
                  background: tab===t ? "var(--bg-hover)" : "transparent",
                  color: tab===t ? "var(--text)" : "var(--text-muted)",
                  border: "1px solid " + (tab===t ? "var(--border)" : "transparent"),
                  borderRadius: 6, padding: "6px 14px",
                  fontSize: 13, fontWeight: 500, cursor: "pointer",
                  transition: "all 0.15s"
                }}>{label}</button>
              ))}
            </nav>

            <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%",
                background: "var(--green)" }} className="pulse" />
              <span style={{ fontSize: 12, color: "var(--text-muted)", fontWeight: 500 }}>System Online</span>
            </div>
          </header>

          <div style={{ flex: 1, overflow: "hidden" }}>
            {tab === "scan"      && <ScanTab />}
            {tab === "prospects" && <ProspectsTab />}
            {tab === "history"   && <HistoryTab />}
          </div>
        </div>
      );
    }

    // ── SCAN TAB ──────────────────────────────────────────────
    function ScanTab() {
      const [zip, setZip]           = useState("76102");
      const [radius, setRadius]     = useState(3);
      const [leads, setLeads]       = useState([]);
      const [scanning, setScanning] = useState(false);
      const [log, setLog]           = useState([]);
      const [selectedLead, setSelectedLead] = useState(null);
      const [outreach, setOutreach] = useState("");
      const [generating, setGenerating] = useState(false);
      const [filter, setFilter]     = useState("All");
      const [cached, setCached]     = useState(false);
      const [statuses, setStatuses] = useState({});
      const logRef = useRef(null);

      useEffect(() => {
        if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
      }, [log]);

      function addLog(msg, type = "info") {
        setLog(prev => [...prev, { msg, type }]);
      }

      function runScan(force = false) {
        if (zip.length !== 5) return;
        setLeads([]); setLog([]); setSelectedLead(null); setOutreach("");
        setScanning(true); setCached(false);
        addLog(`Starting ${radius}-mile scan around ${zip}...`);

        const es = new EventSource(`${API_BASE}/prospect/stream?zip=${zip}&radiusMiles=${radius}&force=${force}`);

        es.onmessage = (e) => {
          const data = JSON.parse(e.data);
          if (data.type === "log")  addLog(data.msg, data.logType);
          else if (data.type === "lead") setLeads(prev => [...prev, data.lead].sort((a,b) => b.score-a.score));
          else if (data.type === "done") { if (data.cached) setCached(true); setScanning(false); es.close(); }
          else if (data.type === "error") { addLog(data.msg, "error"); setScanning(false); es.close(); }
        };
        es.onerror = () => { if (es.readyState !== EventSource.CLOSED) { addLog("Connection lost.", "error"); setScanning(false); es.close(); } };
      }

      async function generateOutreach(lead) {
        setSelectedLead(lead); setOutreach(""); setGenerating(true);
        try {
          const res = await fetch(`${API_BASE}/generate-email`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ lead })
          });
          const data = await res.json();
          setOutreach(data.email || "Could not generate email.");
        } catch(e) { setOutreach("Error: backend unreachable."); }
        setGenerating(false);
      }

      async function updateStatus(lead, status) {
        setStatuses(prev => ({ ...prev, [lead.id]: status }));
        await fetch(`${API_BASE}/prospects/${lead.id}`, {
          method: "PATCH", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ status })
        });
      }

      const filtered = filter === "All" ? leads : leads.filter(l => l.priority === filter);
      const high = leads.filter(l=>l.priority==="High").length;
      const med  = leads.filter(l=>l.priority==="Medium").length;
      const low  = leads.filter(l=>l.priority==="Low").length;

      return (
        <div style={{ display: "flex", height: "100%", overflow: "hidden" }}>

          {/* LEFT SIDEBAR */}
          <div style={{ width: 272, borderRight: "1px solid var(--border)",
            display: "flex", flexDirection: "column", flexShrink: 0,
            background: "var(--bg-card)", overflow: "hidden" }}>
            <div style={{ padding: "20px 16px", flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 20 }}>

              {/* Zip input */}
              <div>
                <SectionLabel>Zip Code</SectionLabel>
                <DarkInput value={zip} placeholder="76102" maxLength={5}
                  onChange={e => setZip(e.target.value.replace(/\D/,"").slice(0,5))}
                  style={{ fontSize: 22, letterSpacing: 8, textAlign: "center", fontWeight: 600,
                    borderColor: zip.length===5 ? "var(--accent)" : "var(--border)" }} />
                {zip.length > 0 && zip.length < 5 &&
                  <div style={{ fontSize: 11, color: "var(--red)", marginTop: 4 }}>Enter a 5-digit zip code</div>}
              </div>

              {/* Radius */}
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <SectionLabel style={{ marginBottom: 0 }}>Search Radius</SectionLabel>
                  <span style={{ fontSize: 13, fontWeight: 600, color: "var(--accent)" }}>{radius} mi</span>
                </div>
                <input type="range" min="1" max="10" step="1" value={radius}
                  onChange={e => setRadius(Number(e.target.value))} />
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8 }}>
                  {RADIUS_OPTIONS.map(r => (
                    <button key={r} onClick={() => setRadius(r)} style={{
                      background: radius===r ? "var(--accent-bg)" : "transparent",
                      color: radius===r ? "var(--accent)" : "var(--text-faint)",
                      border: `1px solid ${radius===r ? "var(--accent)55" : "var(--border)"}`,
                      borderRadius: 4, padding: "3px 8px", fontSize: 11,
                      fontWeight: 600, cursor: "pointer"
                    }}>{r}mi</button>
                  ))}
                </div>
              </div>

              {/* Estimates */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                <div style={{ background: "var(--bg)", border: "1px solid var(--border)",
                  borderRadius: 6, padding: "10px 12px" }}>
                  <div style={{ fontSize: 16, fontWeight: 700, color: "var(--text)" }}>{EST.count[radius]}</div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 2 }}>Est. businesses</div>
                </div>
                <div style={{ background: "var(--bg)", border: "1px solid var(--border)",
                  borderRadius: 6, padding: "10px 12px" }}>
                  <div style={{ fontSize: 16, fontWeight: 700, color: "var(--text)" }}>{EST.time[radius]}</div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 2 }}>Est. runtime</div>
                </div>
              </div>

              {/* Scan button */}
              <div style={{ display: "flex", gap: 8 }}>
                <PrimaryBtn onClick={() => runScan(false)} disabled={zip.length!==5} loading={scanning}
                  style={{ flex: 1, padding: "11px" }}>
                  {scanning ? "Scanning..." : "Run Scan"}
                </PrimaryBtn>
                {cached && (
                  <GhostBtn onClick={() => runScan(true)} style={{ padding: "11px 14px", fontSize: 16 }}>↻</GhostBtn>
                )}
              </div>

              {/* Results summary */}
              {leads.length > 0 && (
                <div>
                  <SectionLabel>Results</SectionLabel>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
                    <div style={{ background: "var(--red-bg)", border: "1px solid var(--red)33",
                      borderRadius: 6, padding: "8px", textAlign: "center" }}>
                      <div style={{ fontSize: 18, fontWeight: 700, color: "var(--red)" }}>{high}</div>
                      <div style={{ fontSize: 10, color: "var(--text-muted)", fontWeight: 500 }}>High</div>
                    </div>
                    <div style={{ background: "var(--yellow-bg)", border: "1px solid var(--yellow)33",
                      borderRadius: 6, padding: "8px", textAlign: "center" }}>
                      <div style={{ fontSize: 18, fontWeight: 700, color: "var(--yellow)" }}>{med}</div>
                      <div style={{ fontSize: 10, color: "var(--text-muted)", fontWeight: 500 }}>Med</div>
                    </div>
                    <div style={{ background: "var(--green-bg)", border: "1px solid var(--green)33",
                      borderRadius: 6, padding: "8px", textAlign: "center" }}>
                      <div style={{ fontSize: 18, fontWeight: 700, color: "var(--green)" }}>{low}</div>
                      <div style={{ fontSize: 10, color: "var(--text-muted)", fontWeight: 500 }}>Low</div>
                    </div>
                  </div>
                </div>
              )}

              {/* Log */}
              <div style={{ flex: 1, display: "flex", flexDirection: "column", minHeight: 0 }}>
                <SectionLabel>Activity Log</SectionLabel>
                <div ref={logRef} style={{
                  flex: 1, background: "var(--bg)", border: "1px solid var(--border)",
                  borderRadius: 6, padding: "10px 12px",
                  overflowY: "auto", fontSize: 11.5, lineHeight: 1.75,
                  fontFamily: "'Courier New', monospace", minHeight: 120, maxHeight: 240
                }}>
                  {log.length === 0 && <span style={{ color: "var(--text-faint)" }}>Awaiting scan...</span>}
                  {log.map((l, i) => (
                    <div key={i} style={{ color:
                      l.type==="success" ? "var(--green)" :
                      l.type==="error"   ? "var(--red)" :
                      "var(--text-muted)", marginBottom: 2 }}>{l.msg}</div>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* MAIN: Results */}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
            {/* Filter bar */}
            <div style={{ padding: "10px 16px", borderBottom: "1px solid var(--border)",
              display: "flex", alignItems: "center", gap: 8, flexShrink: 0,
              background: "var(--bg)" }}>
              <span style={{ fontSize: 12, color: "var(--text-muted)", fontWeight: 500, marginRight: 4 }}>Priority</span>
              {["All","High","Medium","Low"].map(f => (
                <FilterPill key={f} label={f} active={filter===f}
                  color={f==="All" ? null : PRIORITY_COLOR[f]}
                  onClick={() => setFilter(f)} />
              ))}
              <span style={{ marginLeft: "auto", fontSize: 12, color: "var(--text-muted)" }}>
                {filtered.length} result{filtered.length!==1?"s":""}
              </span>
            </div>

            <div style={{ flex: 1, overflowY: "auto", padding: "16px" }}>
              {leads.length === 0 && !scanning && (
                <div style={{ textAlign: "center", marginTop: 100 }}>
                  <div style={{ fontSize: 40, marginBottom: 12 }}>🗺️</div>
                  <div style={{ fontSize: 14, color: "var(--text-muted)", fontWeight: 500 }}>No results yet</div>
                  <div style={{ fontSize: 12, color: "var(--text-faint)", marginTop: 6 }}>Enter a zip code and hit Run Scan to find WordPress prospects</div>
                </div>
              )}
              {scanning && leads.length === 0 && (
                <div style={{ textAlign: "center", marginTop: 100 }}>
                  <div style={{ fontSize: 13, color: "var(--text-muted)" }}>
                    <span className="spin" style={{ display: "inline-block", marginRight: 8 }}>⟳</span>
                    Scanning area...
                  </div>
                  <div style={{ fontSize: 11, color: "var(--text-faint)", marginTop: 8 }}>Results will appear as they're found</div>
                </div>
              )}
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {filtered.map(lead => (
                  <LeadCard key={lead.id} lead={lead}
                    selected={selectedLead?.id===lead.id}
                    status={statuses[lead.id] || lead.status}
                    onClick={() => generateOutreach(lead)}
                    onStatus={s => updateStatus(lead, s)} />
                ))}
              </div>
            </div>
          </div>

          {/* RIGHT: Email */}
          <div style={{ width: 340, borderLeft: "1px solid var(--border)",
            display: "flex", flexDirection: "column", flexShrink: 0,
            background: "var(--bg-card)", overflow: "hidden" }}>
            <div style={{ padding: "14px 16px", borderBottom: "1px solid var(--border)" }}>
              <div style={{ fontWeight: 600, fontSize: 13 }}>Outreach Email</div>
              <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 2 }}>AI-generated cold email</div>
            </div>
            <div style={{ flex: 1, padding: "16px", display: "flex", flexDirection: "column", gap: 12, overflow: "hidden" }}>
              {!selectedLead && (
                <div style={{ textAlign: "center", marginTop: 60 }}>
                  <div style={{ fontSize: 28, marginBottom: 10 }}>✉️</div>
                  <div style={{ fontSize: 13, color: "var(--text-muted)", fontWeight: 500 }}>Select a prospect</div>
                  <div style={{ fontSize: 11, color: "var(--text-faint)", marginTop: 4 }}>Click any lead card to generate a personalized outreach email</div>
                </div>
              )}
              {selectedLead && (
                <>
                  <div style={{ background: "var(--bg)", border: "1px solid var(--border)",
                    borderRadius: 6, padding: "12px" }}>
                    <div style={{ fontWeight: 600, fontSize: 14 }}>{selectedLead.name}</div>
                    <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 2 }}>{selectedLead.domain}</div>
                  </div>
                  {generating && (
                    <div style={{ textAlign: "center", padding: "20px 0", color: "var(--text-muted)", fontSize: 13 }}>
                      <span className="spin" style={{ display: "inline-block", marginRight: 8 }}>⟳</span>
                      Generating email...
                    </div>
                  )}
                  {outreach && !generating && (
                    <>
                      <textarea value={outreach} onChange={e => setOutreach(e.target.value)}
                        style={{ flex: 1, background: "var(--bg-input)",
                          border: "1px solid var(--border)", color: "var(--text)",
                          borderRadius: 6, padding: "12px",
                          fontSize: 12, lineHeight: 1.7, fontFamily: "Inter,sans-serif",
                          resize: "none", outline: "none", minHeight: 260 }} />
                      <div style={{ display: "flex", gap: 8 }}>
                        <GhostBtn onClick={() => navigator.clipboard.writeText(outreach)}
                          style={{ flex: 1, fontSize: 13 }}>Copy Email</GhostBtn>
                        <PrimaryBtn onClick={() => {}}
                          style={{ flex: 1, padding: "9px", fontSize: 13, background: "var(--green)",
                            opacity: 1 }}>✓ Mark Sent</PrimaryBtn>
                      </div>
                    </>
                  )}
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ── PROSPECTS TAB ─────────────────────────────────────────
    function ProspectsTab() {
      const [prospects, setProspects] = useState([]);
      const [loading, setLoading]     = useState(true);
      const [filter, setFilter]       = useState("All");
      const [statusFilter, setStatusFilter] = useState("All");
      const [selected, setSelected]   = useState(null);
      const [outreach, setOutreach]   = useState("");
      const [generating, setGenerating] = useState(false);
      const [notes, setNotes]         = useState("");
      const [editingNotes, setEditingNotes] = useState(false);

      useEffect(() => { load(); }, []);

      async function load() {
        setLoading(true);
        try { const r = await fetch(`${API_BASE}/prospects`); const d = await r.json(); setProspects(d.prospects||[]); }
        catch(e){}
        setLoading(false);
      }

      async function updateStatus(id, status) {
        await fetch(`${API_BASE}/prospects/${id}`, {
          method:"PATCH", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({status})
        });
        setProspects(prev => prev.map(p => p.id===id?{...p,status}:p));
        if (selected?.id===id) setSelected(s => ({...s,status}));
      }

      async function saveNotes(id) {
        await fetch(`${API_BASE}/prospects/${id}`, {
          method:"PATCH", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({notes})
        });
        setProspects(prev => prev.map(p => p.id===id?{...p,notes}:p));
        setEditingNotes(false);
      }

      async function selectLead(lead) {
        setSelected(lead); setOutreach(""); setNotes(lead.notes||""); setEditingNotes(false);
        setGenerating(true);
        try {
          const r = await fetch(`${API_BASE}/generate-email`, {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({lead})
          });
          const d = await r.json();
          setOutreach(d.email||"Could not generate.");
        } catch(e) { setOutreach("Error: backend unreachable."); }
        setGenerating(false);
      }

      const counts = { new:0, contacted:0, won:0, lost:0 };
      prospects.forEach(p => { if(counts[p.status]!==undefined) counts[p.status]++; });
      let filtered = prospects;
      if (filter!=="All") filtered = filtered.filter(p=>p.priority===filter);
      if (statusFilter!=="All") filtered = filtered.filter(p=>p.status===statusFilter);

      return (
        <div style={{ display:"flex", height:"100%", overflow:"hidden" }}>
          <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>

            {/* Status row */}
            <div style={{ display:"flex", borderBottom:"1px solid var(--border)", flexShrink:0 }}>
              {Object.entries(counts).map(([s,c]) => (
                <button key={s} onClick={() => setStatusFilter(statusFilter===s?"All":s)} style={{
                  flex:1, padding:"14px 0", background: statusFilter===s?`${STATUS_COLOR[s]}08`:"transparent",
                  border:"none", borderRight:"1px solid var(--border)", cursor:"pointer",
                  borderBottom: statusFilter===s ? `2px solid ${STATUS_COLOR[s]}` : "2px solid transparent",
                  transition:"all 0.15s"
                }}>
                  <div style={{ fontSize:22, fontWeight:700, color:STATUS_COLOR[s], lineHeight:1 }}>{c}</div>
                  <div style={{ fontSize:11, color:"var(--text-muted)", marginTop:3, fontWeight:500, textTransform:"capitalize" }}>{s}</div>
                </button>
              ))}
              <button onClick={load} style={{ padding:"0 20px", background:"none",
                border:"none", borderLeft:"1px solid var(--border)", color:"var(--text-muted)",
                cursor:"pointer", fontSize:18, transition:"color 0.15s" }}
                onMouseEnter={e=>e.currentTarget.style.color="var(--text)"}
                onMouseLeave={e=>e.currentTarget.style.color="var(--text-muted)"}>↻</button>
            </div>

            {/* Filters */}
            <div style={{ padding:"10px 16px", borderBottom:"1px solid var(--border)",
              display:"flex", gap:8, alignItems:"center", flexShrink:0, background:"var(--bg)" }}>
              <span style={{ fontSize:12, color:"var(--text-muted)", fontWeight:500 }}>Priority</span>
              {["All","High","Medium","Low"].map(f => (
                <FilterPill key={f} label={f} active={filter===f}
                  color={f==="All"?null:PRIORITY_COLOR[f]} onClick={() => setFilter(f)} />
              ))}
              <span style={{ marginLeft:"auto", fontSize:12, color:"var(--text-muted)" }}>
                {filtered.length} result{filtered.length!==1?"s":""}
              </span>
            </div>

            <div style={{ flex:1, overflowY:"auto", padding:"16px" }}>
              {loading && <div style={{ color:"var(--text-muted)", fontSize:13 }}>Loading...</div>}
              {!loading && filtered.length===0 && (
                <div style={{ textAlign:"center", marginTop:60, color:"var(--text-muted)", fontSize:13 }}>No prospects found. Run a scan first!</div>
              )}
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {filtered.map(lead => (
                  <LeadCard key={lead.id} lead={lead} selected={selected?.id===lead.id}
                    status={lead.status} onClick={() => selectLead(lead)}
                    onStatus={s => updateStatus(lead.id, s)} />
                ))}
              </div>
            </div>
          </div>

          {/* Detail pane */}
          <div style={{ width:360, borderLeft:"1px solid var(--border)", background:"var(--bg-card)",
            display:"flex", flexDirection:"column", overflow:"hidden" }}>
            <div style={{ padding:"14px 16px", borderBottom:"1px solid var(--border)" }}>
              <div style={{ fontWeight:600, fontSize:13 }}>Prospect Details</div>
            </div>
            <div style={{ flex:1, overflowY:"auto", padding:"16px", display:"flex", flexDirection:"column", gap:16 }}>
              {!selected && (
                <div style={{ textAlign:"center", marginTop:60, color:"var(--text-muted)", fontSize:13 }}>Select a prospect to view details</div>
              )}
              {selected && (<>
                <div>
                  <div style={{ fontWeight:700, fontSize:16 }}>{selected.name}</div>
                  <a href={selected.website} target="_blank" style={{ fontSize:12, color:"var(--accent)", textDecoration:"none" }}>{selected.website}</a>
                  {selected.phone && <div style={{ fontSize:12, color:"var(--text-muted)", marginTop:4 }}>📞 {selected.phone}</div>}
                  {selected.address && <div style={{ fontSize:11, color:"var(--text-faint)", marginTop:2 }}>{selected.address}</div>}
                </div>

                {/* Status buttons */}
                <div>
                  <SectionLabel>Status</SectionLabel>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                    {["new","contacted","won","lost"].map(s => (
                      <button key={s} onClick={() => updateStatus(selected.id, s)} style={{
                        background: selected.status===s ? STATUS_BG[s] : "transparent",
                        color: STATUS_COLOR[s],
                        border:`1px solid ${selected.status===s ? STATUS_COLOR[s]+"55" : "var(--border)"}`,
                        borderRadius:20, padding:"4px 14px", fontSize:12, fontWeight:600,
                        cursor:"pointer", textTransform:"capitalize", transition:"all 0.15s"
                      }}>{s}</button>
                    ))}
                  </div>
                </div>

                {/* Screenshot */}
                {selected.screenshot && (
                  <div style={{ borderRadius:6px, overflow:"hidden", border:"1px solid var(--border)" }}>
                    <div style={{ fontSize:11, color:"var(--text-muted)", padding:"6px 10px",
                      background:"var(--bg)", borderBottom:"1px solid var(--border)", fontWeight:500 }}>
                      Site Preview
                    </div>
                    <img src={selected.screenshot} style={{ width:"100%", maxHeight:170,
                      objectFit:"cover", objectPosition:"top", display:"block" }} />
                  </div>
                )}

                {/* Issues */}
                <div>
                  <SectionLabel>Issues Detected</SectionLabel>
                  <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                    {(selected.issues||[]).map(iss => (
                      <div key={iss} style={{ display:"flex", alignItems:"center", gap:8,
                        background:"var(--yellow-bg)", border:"1px solid var(--yellow)22",
                        borderRadius:6px, padding:"6px 10px", fontSize:12, color:"var(--yellow)" }}>
                        ⚠ {iss}
                      </div>
                    ))}
                  </div>
                </div>

                {/* Notes */}
                <div>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                    <SectionLabel style={{ marginBottom:0 }}>Notes</SectionLabel>
                    <button onClick={() => setEditingNotes(!editingNotes)} style={{
                      background:"none", border:"none", color:"var(--accent)", fontSize:12,
                      cursor:"pointer", fontWeight:500 }}>{editingNotes?"Cancel":"Edit"}</button>
                  </div>
                  {editingNotes ? (
                    <>
                      <textarea value={notes} onChange={e=>setNotes(e.target.value)}
                        style={{ width:"100%", background:"var(--bg-input)", border:"1px solid var(--border)",
                          color:"var(--text)", borderRadius:6px, padding:"10px",
                          fontSize:12, lineHeight:1.7, fontFamily:"Inter,sans-serif",
                          resize:"none", outline:"none", height:90 }} />
                      <PrimaryBtn onClick={() => saveNotes(selected.id)}
                        style={{ marginTop:8, padding:"8px" }}>Save Notes</PrimaryBtn>
                    </>
                  ) : (
                    <div style={{ fontSize:12, color:selected.notes?"var(--text)":"var(--text-faint)",
                      fontStyle:selected.notes?"normal":"italic", lineHeight:1.7 }}>
                      {selected.notes||"No notes yet. Click Edit to add notes."}
                    </div>
                  )}
                </div>

                {/* Email */}
                <div>
                  <SectionLabel>Outreach Email</SectionLabel>
                  {generating && <div style={{ color:"var(--text-muted)", fontSize:12 }}>
                    <span className="spin" style={{ display:"inline-block", marginRight:6 }}>⟳</span>Generating...
                  </div>}
                  {outreach && !generating && (
                    <>
                      <textarea value={outreach} onChange={e=>setOutreach(e.target.value)}
                        style={{ width:"100%", background:"var(--bg-input)", border:"1px solid var(--border)",
                          color:"var(--text)", borderRadius:6px, padding:"10px",
                          fontSize:11.5, lineHeight:1.75, fontFamily:"Inter,sans-serif",
                          resize:"none", outline:"none", height:160 }} />
                      <GhostBtn onClick={() => navigator.clipboard.writeText(outreach)}
                        style={{ marginTop:8, width:"100%", fontSize:13 }}>Copy Email</GhostBtn>
                    </>
                  )}
                </div>
              </>)}
            </div>
          </div>
        </div>
      );
    }

    // ── HISTORY TAB ───────────────────────────────────────────
    function HistoryTab() {
      const [scans, setScans]     = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        (async () => {
          try { const r = await fetch(`${API_BASE}/scans`); const d = await r.json(); setScans(d.scans||[]); }
          catch(e){}
          setLoading(false);
        })();
      }, []);

      const totalFound   = scans.reduce((a,s) => a+s.found, 0);
      const totalScanned = scans.reduce((a,s) => a+s.scanned, 0);
      const avgHitRate   = totalScanned > 0 ? Math.round((totalFound/totalScanned)*100) : 0;

      return (
        <div style={{ padding:"24px", overflowY:"auto", height:"100%" }}>
          <div style={{ maxWidth:860 }}>
            <div style={{ marginBottom:20 }}>
              <div style={{ fontWeight:700, fontSize:18 }}>Scan History</div>
              <div style={{ fontSize:12, color:"var(--text-muted)", marginTop:2 }}>{scans.length} scans completed</div>
            </div>

            {/* Summary stats */}
            {scans.length > 0 && (
              <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:20 }}>
                <div style={{ background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:8px, padding:"16px 20px" }}>
                  <div style={{ fontSize:28, fontWeight:700, color:"var(--accent)" }}>{scans.length}</div>
                  <div style={{ fontSize:12, color:"var(--text-muted)", marginTop:4 }}>Total scans</div>
                </div>
                <div style={{ background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:8px, padding:"16px 20px" }}>
                  <div style={{ fontSize:28, fontWeight:700, color:"var(--green)" }}>{totalFound}</div>
                  <div style={{ fontSize:12, color:"var(--text-muted)", marginTop:4 }}>WordPress sites found</div>
                </div>
                <div style={{ background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:8px, padding:"16px 20px" }}>
                  <div style={{ fontSize:28, fontWeight:700, color:"var(--yellow)" }}>{avgHitRate}%</div>
                  <div style={{ fontSize:12, color:"var(--text-muted)", marginTop:4 }}>Avg hit rate</div>
                </div>
              </div>
            )}

            {loading && <div style={{ color:"var(--text-muted)", fontSize:13 }}>Loading...</div>}
            {!loading && scans.length===0 && (
              <div style={{ textAlign:"center", marginTop:60, color:"var(--text-muted)" }}>
                <div style={{ fontSize:32, marginBottom:10 }}>📭</div>
                <div style={{ fontSize:14, fontWeight:500 }}>No scan history yet</div>
                <div style={{ fontSize:12, marginTop:4 }}>Run your first scan to see results here</div>
              </div>
            )}

            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {scans.map((scan, i) => {
                const hitRate = scan.scanned > 0 ? Math.round((scan.found/scan.scanned)*100) : 0;
                return (
                  <div key={scan.id} style={{ background:"var(--bg-card)", border:"1px solid var(--border)",
                    borderRadius:8px, padding:"16px 20px",
                    display:"flex", alignItems:"center", gap:20 }}>
                    <div style={{ width:32, height:32, background:"var(--accent-bg)",
                      border:"1px solid var(--accent)33", borderRadius:6px,
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:11, fontWeight:700, color:"var(--accent)", flexShrink:0 }}>
                      #{i+1}
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:600, fontSize:14 }}>
                        Zip {scan.zip} — {scan.radius} mile radius
                      </div>
                      <div style={{ fontSize:11, color:"var(--text-muted)", marginTop:2 }}>{scan.created_at}</div>
                    </div>
                    <div style={{ display:"flex", gap:16, alignItems:"center" }}>
                      <div style={{ textAlign:"center" }}>
                        <div style={{ fontSize:20, fontWeight:700, color:"var(--green)" }}>{scan.found}</div>
                        <div style={{ fontSize:10, color:"var(--text-muted)", fontWeight:500 }}>Found</div>
                      </div>
                      <div style={{ textAlign:"center" }}>
                        <div style={{ fontSize:20, fontWeight:700, color:"var(--text-muted)" }}>{scan.scanned}</div>
                        <div style={{ fontSize:10, color:"var(--text-faint)", fontWeight:500 }}>Scanned</div>
                      </div>
                      <div style={{ textAlign:"center", minWidth:48 }}>
                        <div style={{ fontSize:20, fontWeight:700,
                          color: hitRate > 30 ? "var(--green)" : hitRate > 15 ? "var(--yellow)" : "var(--text-muted)" }}>
                          {hitRate}%
                        </div>
                        <div style={{ fontSize:10, color:"var(--text-faint)", fontWeight:500 }}>Hit rate</div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ── Lead Card ─────────────────────────────────────────────
    function LeadCard({ lead, selected, status, onClick }) {
      const [imgError, setImgError] = useState(false);
      const [hover, setHover]       = useState(false);
      const pc = PRIORITY_COLOR[lead.priority];
      const sc = STATUS_COLOR[status];

      return (
        <div onClick={onClick} className="fade-in"
          onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
          style={{
            display:"flex", overflow:"hidden", borderRadius:8px,
            border:`1px solid ${selected ? "var(--accent)" : hover ? "#3a4560" : "var(--border)"}`,
            background: selected ? "var(--accent-bg)" : hover ? "var(--bg-hover)" : "var(--bg-card)",
            cursor:"pointer", transition:"all 0.15s",
            boxShadow: selected ? "0 0 0 1px var(--accent)55" : "var(--shadow)"
          }}>

          {/* Priority stripe */}
          <div style={{ width:4, background:pc, flexShrink:0 }} />

          {/* Screenshot */}
          <div style={{ width:80, flexShrink:0, background:"var(--bg)",
            borderRight:`1px solid var(--border)`, overflow:"hidden",
            display:"flex", alignItems:"center", justifyContent:"center", minHeight:72 }}>
            {lead.screenshot && !imgError ? (
              <img src={lead.screenshot} onError={() => setImgError(true)}
                style={{ width:"100%", height:"100%", objectFit:"cover", objectPosition:"top", display:"block" }} />
            ) : (
              <span style={{ fontSize:20, opacity:0.2 }}>🌐</span>
            )}
          </div>

          {/* Body */}
          <div style={{ flex:1, padding:"10px 14px", minWidth:0 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 }}>
              <div style={{ minWidth:0 }}>
                <div style={{ fontWeight:600, fontSize:14, color:"var(--text)",
                  whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{lead.name}</div>
                <div style={{ fontSize:11, color:"var(--text-muted)", marginTop:1 }}>{lead.domain}</div>
              </div>
              <div style={{ display:"flex", gap:5, flexShrink:0 }}>
                <Chip label={lead.priority} color={pc} bg={PRIORITY_BG[lead.priority]} />
                <Chip label={status} color={sc} bg={STATUS_BG[status]} />
              </div>
            </div>

            <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginTop:8 }}>
              {(lead.issues||[]).slice(0,2).map(iss => (
                <span key={iss} style={{ background:"var(--yellow-bg)", border:"1px solid var(--yellow)22",
                  borderRadius:4, padding:"2px 7px", fontSize:10.5, color:"var(--yellow)", fontWeight:500 }}>
                  {iss}
                </span>
              ))}
              {(lead.issues||[]).length > 2 &&
                <span style={{ fontSize:10.5, color:"var(--text-faint)" }}>+{lead.issues.length-2} more</span>}
            </div>

            <div style={{ display:"flex", gap:14, marginTop:7, fontSize:11, color:"var(--text-faint)" }}>
              {lead.wpVersion && <span>WP {lead.wpVersion}</span>}
              <span style={{ color:pc, fontWeight:600 }}>Score: {lead.score}</span>
              {lead.phone && <span>{lead.phone}</span>}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
